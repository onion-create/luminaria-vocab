<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"><meta name="theme-color" content="#7A4B5E"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="Luminaria"><meta name="mobile-web-app-capable" content="yes"><meta name="application-name" content="Luminaria"><meta name="description" content="A serene floating vocabulary app with FSRS adaptive memory algorithm."><link rel="manifest" href="manifest.json"><link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png"><link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png"><link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png"><link rel="apple-touch-icon" href="icons/apple-touch-icon.png"><title>Luminaria · 浮光词集</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
:root{--pink-lt:#F5E6E8;--pink:#E2C4CB;--rose:#C47A8B;--wine:#7A4B5E;--gold:#E8D5A3;--purple:#8B6F8C;--lav:#D4C5D6;--blue:#8DAFC2;--mint:#A3C9C0;--cream:#FBF7F0;--shadow:0 4px 24px rgba(122,75,94,0.12);--glass:rgba(251,247,240,0.7);--glass-b:rgba(196,122,139,0.3);--trans:0.4s cubic-bezier(0.25,0.46,0.45,0.94);--fs:26px;--ff:'Georgia','Times New Roman',serif;--tf:'Playfair Display','Georgia',serif;--wdur:15s}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;height:100vh;width:100vw;font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#FFFDFC,#FFF8F4 22%,#FFF5EE 44%,#FFF8F6 66%,#FFFBF8 88%,#FFFDFC);background-size:400% 400%;animation:bgs 45s ease infinite}
.bgf{position:fixed;inset:0;z-index:0;pointer-events:none;backdrop-filter:blur(90px) saturate(0.85);-webkit-backdrop-filter:blur(90px) saturate(0.85);background:rgba(255,255,255,0.12)}
#wc{position:fixed;inset:0;z-index:1;pointer-events:none}
.wb{position:absolute;pointer-events:auto;white-space:nowrap;font-family:var(--ff);font-size:var(--fs);font-weight:700;letter-spacing:0.6px;text-shadow:0 0 12px rgba(255,255,255,0.8),0 1px 2px rgba(100,60,75,0.1);will-change:transform,opacity,filter;z-index:10;cursor:pointer;animation-fill-mode:both!important;transition:filter 0.3s,box-shadow 0.3s}
.wb:hover{filter:brightness(1.1) drop-shadow(0 0 18px rgba(232,213,163,0.7));z-index:11}
.wb.mastered{opacity:0.45!important;text-decoration:line-through}
.wb.a0{animation:a0 var(--wdur) ease-in-out both;transform-origin:top center}@keyframes a0{0%{opacity:0;transform:rotate(-12deg)}6%{opacity:0.9;transform:rotate(0deg)}20%{transform:rotate(10deg)}42%{transform:rotate(-8deg)}62%{transform:rotate(5deg)}80%{transform:rotate(-2deg)}92%{opacity:0.6;transform:rotate(0deg)}100%{opacity:0;transform:rotate(0deg)}}
.wb.a1{animation:a1 var(--wdur) ease-in-out both}@keyframes a1{0%{opacity:0;transform:translateY(0) scale(0.5)}8%{opacity:1;transform:translateY(-3vh) scale(1)}35%{transform:translateY(-15vh) scale(1.04) translateX(5px)}65%{transform:translateY(-28vh) scale(1) translateX(-6px)}85%{opacity:0.8;transform:translateY(-38vh) scale(1.08)}100%{opacity:0;transform:translateY(-50vh) scale(1.2)}}
.wb.a2{animation:a2 var(--wdur) ease-in-out both}@keyframes a2{0%{opacity:0;transform:translateX(-30px)}8%{opacity:1;transform:translateX(0) translateY(2px)}40%{transform:translateX(12px) translateY(-4px)}70%{transform:translateX(-10px) translateY(3px)}90%{opacity:0.6;transform:translateX(6px) translateY(-2px)}100%{opacity:0;transform:translateX(25px) translateY(0)}}
.wb.a3{animation:a3 var(--wdur) ease-in-out both}@keyframes a3{0%{opacity:0;transform:translate(0,0) rotate(0deg) scale(0.3)}8%{opacity:0.9;transform:translate(6px,-4vh) rotate(12deg) scale(1)}30%{transform:translate(-4px,-14vh) rotate(-6deg)}55%{transform:translate(10px,-26vh) rotate(15deg)}80%{transform:translate(-8px,-36vh) rotate(-10deg)}95%{opacity:0.3;transform:translate(3px,-45vh) rotate(5deg)}100%{opacity:0;transform:translate(10px,-52vh) rotate(20deg)}}
.wb.a4{animation:a4 var(--wdur) ease-in-out both}@keyframes a4{0%{opacity:0;filter:brightness(1)}6%{opacity:1;filter:brightness(1.6)}18%{opacity:0.5;filter:brightness(1);transform:translate(8px,-6px)}40%{opacity:1;filter:brightness(1.8);transform:translate(-4px,4px)}65%{opacity:0.4;filter:brightness(1);transform:translate(-10px,-3px)}82%{opacity:0.9;filter:brightness(2);transform:translate(3px,6px)}100%{opacity:0;filter:brightness(0.5);transform:translate(-2px,10px)}}
.wb.a5{animation:a5 var(--wdur) ease-in-out both}@keyframes a5{0%{opacity:0;transform:scale(0.3) translateY(0)}10%{opacity:0.85;transform:scale(1.12) translateY(-6px)}22%{opacity:0.45;transform:scale(0.88) translateY(-12px)}38%{opacity:1;transform:scale(1.08) translateY(-18px)}58%{opacity:0.35;transform:scale(0.82) translateY(-26px)}78%{opacity:0.65;transform:scale(1.04) translateY(-34px)}90%{opacity:0.3;transform:scale(0.7) translateY(-40px)}100%{opacity:0;transform:scale(0.4) translateY(-48px)}}
.wb.a6{animation:a6 var(--wdur) ease-in-out both}@keyframes a6{0%{opacity:0;transform:rotate(0deg) translateX(0)}8%{opacity:1;transform:rotate(30deg) translateX(4px)}35%{transform:rotate(110deg) translateX(-4px)}65%{transform:rotate(210deg) translateX(5px)}85%{transform:rotate(300deg) translateX(-4px)}100%{opacity:0;transform:rotate(360deg) translateX(0)}}
.wb.a7{animation:a7 var(--wdur) ease-in-out both}@keyframes a7{0%{opacity:0;transform:translate(0,25px) rotate(-8deg)}8%{opacity:1;transform:translate(8px,0) rotate(4deg)}40%{transform:translate(-4px,-15px) rotate(-2deg)}70%{transform:translate(12px,-28px) rotate(6deg)}90%{opacity:0.5;transform:translate(-6px,-35px) rotate(-4deg)}100%{opacity:0;transform:translate(4px,-45px) rotate(12deg)}}
.wb.a8{animation:a8 var(--wdur) ease-in-out both}@keyframes a8{0%{opacity:0;transform:translate(-15px,10px) rotate(-4deg)}6%{opacity:0.75;transform:translate(0,0) rotate(0deg)}25%{transform:translate(10px,-12px) rotate(2deg)}50%{transform:translate(-6px,-22px) rotate(-1deg)}75%{opacity:0.5;transform:translate(8px,-35px) rotate(3deg)}92%{opacity:0.2;transform:translate(20px,-44px) rotate(5deg)}100%{opacity:0;transform:translate(28px,-50px) rotate(8deg)}}
.wb.a9{animation:a9 var(--wdur) cubic-bezier(0,1.5,0.5,1) both}@keyframes a9{0%{opacity:0;transform:scale(0)}4%{opacity:1;transform:scale(1.3)}12%{opacity:1;transform:scale(1)}85%{opacity:0.7;transform:scale(1)}100%{opacity:0;transform:scale(0.6)}}
.sb{position:fixed;bottom:100px;right:90px;z-index:55;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid var(--glass-b);border-radius:16px;padding:10px 16px;font-size:13px;color:var(--wine);font-family:var(--ff);letter-spacing:0.3px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);pointer-events:none;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:200px;text-align:center}
.sb.sh{opacity:1;transform:translateY(0)}
.sb::after{content:'';position:absolute;bottom:-8px;right:20px;width:16px;height:16px;background:var(--glass);border-right:1.5px solid var(--glass-b);border-bottom:1.5px solid var(--glass-b);transform:rotate(45deg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.stats{position:fixed;top:20px;left:20px;z-index:50;display:flex;gap:8px;opacity:0.85;transition:opacity 0.4s}
.stats:hover{opacity:1}
.stats .sc{background:var(--glass);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1.5px solid var(--glass-b);border-radius:14px;padding:10px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:3px;min-width:88px;transition:var(--trans)}
.stats .sc:hover{transform:translateY(-2px)}
.stats .sc .sv{font-family:var(--ff);font-size:26px;font-weight:700;color:var(--wine);line-height:1}
.stats .sc .sl{font-size:12px;color:var(--purple);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap;font-weight:600}
.stats .sc .ss{font-size:10px;color:var(--rose);opacity:0.8}
.stats .sr{animation:sr 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes sr{0%{transform:scale(1)}30%{transform:scale(1.2)}100%{transform:scale(1)}}
.achv{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:150;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:2px solid var(--gold);border-radius:24px;padding:20px 32px;text-align:center;opacity:0;pointer-events:none;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.achv.show{opacity:1;transform:translate(-50%,-60%)}
.sg h4{font-size:11px;color:var(--purple);margin-bottom:6px;opacity:0.7;text-transform:uppercase;letter-spacing:1px}
.ag{display:flex;gap:6px;flex-wrap:wrap}
.ao{padding:7px 10px;border-radius:8px;border:1.5px solid var(--glass-b);background:rgba(255,255,255,0.5);font-size:11px;color:#3D2B3A;cursor:pointer;text-align:center;transition:var(--trans)}
.ao:hover{background:rgba(255,255,255,0.85);border-color:var(--rose)}
.ao.ac{background:var(--pink);color:#fff;border-color:var(--rose);font-weight:600}
.qo{position:fixed;inset:0;z-index:99;background:rgba(61,43,58,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.qo.ac{opacity:1;pointer-events:auto}
.qm{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:2px solid var(--gold);border-radius:22px;padding:28px 24px;max-width:440px;width:90%;box-shadow:0 8px 48px rgba(107,58,91,0.25);position:relative;text-align:center}
.qh{margin-bottom:12px}
.qw{font-family:var(--ff);font-size:38px;font-weight:700;color:var(--wine);letter-spacing:1px;margin-bottom:6px}
.spkr{background:none;border:1.5px solid var(--glass-b);border-radius:50%;width:36px;height:36px;font-size:16px;cursor:pointer;transition:var(--trans);display:inline-flex;align-items:center;justify-content:center;margin-left:8px;vertical-align:middle}
.spkr:hover{background:rgba(255,255,255,0.9);border-color:var(--rose);transform:scale(1.15)}
.qmeta{margin-bottom:10px;font-size:11px}
.mbadge{background:var(--mint);color:#2E7D32;border-radius:10px;padding:3px 10px;font-size:10px}
.qow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.qob{padding:12px;border-radius:12px;border:1.5px solid var(--glass-b);background:rgba(255,255,255,0.6);font-size:14px;color:var(--wine);cursor:pointer;transition:var(--trans)}
.qob:hover{background:rgba(255,255,255,0.9);border-color:var(--rose)}
.qob.ok{background:#E8F5E9!important;border-color:#4CAF50!important;color:#2E7D32!important}
.qob.ng{background:#FFEBEE!important;border-color:#EF5350!important;color:#C62828!important}
.qob.correct-flash{background:#E8F5E9!important;border-color:#4CAF50!important;color:#2E7D32!important;animation:flash 0.5s ease}
@keyframes flash{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.st{position:fixed;top:24px;right:24px;z-index:100;width:50px;height:50px;border-radius:50%;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--purple);box-shadow:var(--shadow);transition:var(--trans)}
.st:hover{transform:scale(1.1);color:var(--rose)}
.so{position:fixed;inset:0;z-index:97;background:rgba(61,43,58,0.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.4s}
.so.op{opacity:1;pointer-events:auto}
.sp{position:fixed;top:50%;right:30px;transform:translateY(-50%);z-index:98;background:linear-gradient(155deg,rgba(255,253,250,0.78),rgba(255,245,240,0.72) 50%,rgba(248,238,238,0.78));backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border:1px solid rgba(232,213,163,0.5);border-radius:24px;padding:24px 22px;width:340px;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(122,75,94,0.15),0 0 0 1px rgba(255,255,255,0.4) inset,0 1px 0 rgba(255,255,255,0.6) inset;opacity:0;pointer-events:none;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.sp.op{opacity:1;pointer-events:auto;box-shadow:0 24px 80px rgba(122,75,94,0.22),0 0 0 1px rgba(255,255,255,0.4) inset,0 1px 0 rgba(255,255,255,0.6) inset}
.sp h3{font-family:var(--ff);font-size:20px;font-weight:600;color:#7A4B5E;text-align:center;margin-bottom:20px;letter-spacing:2px;position:relative;padding-bottom:14px}
.sp h3::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:1px}
.sg{margin-bottom:18px;padding:12px 14px;background:rgba(255,255,255,0.4);border-radius:14px;border:1px solid rgba(232,213,163,0.25);transition:all 0.3s}
.sg:hover{background:rgba(255,255,255,0.6);border-color:rgba(196,122,139,0.3);transform:translateY(-1px);box-shadow:0 4px 12px rgba(122,75,94,0.08)}
.sg h4{font-size:10px;color:#A3707D;margin-bottom:8px;opacity:1;text-transform:uppercase;letter-spacing:2px;font-weight:700}
.ag{display:flex;gap:6px;flex-wrap:wrap}
.ao{padding:8px 12px;border-radius:10px;border:1.5px solid rgba(196,122,139,0.2);background:rgba(255,255,255,0.7);font-size:11px;color:#5B4053;cursor:pointer;text-align:center;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);font-weight:500}
.ao:hover{background:rgba(255,255,255,0.95);border-color:#C47A8B;transform:translateY(-2px) scale(1.04);color:#7A4B5E;box-shadow:0 4px 12px rgba(196,122,139,0.2)}
.ao.ac{background:linear-gradient(135deg,#E8A0BF,#C47A8B);color:#fff;border-color:transparent;font-weight:600;box-shadow:0 4px 16px rgba(196,122,139,0.4);transform:scale(1.04)}
.cp{display:flex;gap:8px;flex-wrap:wrap;padding:4px}
.fsrs-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fsrs-row:last-child{margin-bottom:0}
.fsrs-label{font-size:10px;color:var(--purple);width:42px;text-align:right;flex-shrink:0;letter-spacing:0.5px}
.fsrs-dots{display:flex;gap:5px;flex-wrap:wrap;max-width:340px}
.fsrs-dot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.2s}
.fsrs-dot:hover{transform:scale(1.2)}
.fsrs-dot.ac{border-color:var(--wine);transform:scale(1.15);box-shadow:0 0 0 2px rgba(122,75,94,0.2)}
.fsrs-preview{width:14px;height:14px;border-radius:50%;flex-shrink:0;border:1px solid rgba(122,75,94,0.15)}
.cd{width:32px;height:32px;border-radius:50%;border:2px solid rgba(232,213,163,0.4);cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 2px 6px rgba(122,75,94,0.1)}
.cd:hover{transform:scale(1.2) translateY(-2px);box-shadow:0 6px 16px rgba(122,75,94,0.2)}
.cd.ac{border-color:#fff;transform:scale(1.18);box-shadow:0 0 0 2px #7A4B5E,0 6px 16px rgba(122,75,94,0.3)}
select{padding:8px 10px;border-radius:10px;border:1.5px solid rgba(232,213,163,0.3);background:rgba(255,255,255,0.7);font-size:12px;color:#5B4053;width:100%;transition:all 0.3s;outline:none;cursor:pointer;font-family:inherit}
#ss,#ds,#dw{-webkit-appearance:none;appearance:none;width:100%;height:4px;background:linear-gradient(90deg,#C47A8B,#E8D5A3);border-radius:2px;outline:none;margin:6px 0}
#ss::-webkit-slider-thumb,#ds::-webkit-slider-thumb,#dw::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #7A4B5E;cursor:pointer;box-shadow:0 2px 8px rgba(122,75,94,0.3);transition:all 0.2s}
#ss::-webkit-slider-thumb:hover,#ds::-webkit-slider-thumb:hover,#dw::-webkit-slider-thumb:hover{transform:scale(1.2);background:#F0E8FF}
#ss::-moz-range-thumb,#ds::-moz-range-thumb,#dw::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:2px solid #7A4B5E;cursor:pointer}
select:focus,#ss:focus,#ds:focus,#dw:focus{border-color:#C47A8B;background:rgba(255,255,255,0.95);box-shadow:0 0 0 3px rgba(196,122,139,0.15)}
.rv{font-size:11px;color:#A3707D;margin-left:8px;font-weight:600}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.qc{position:absolute;top:12px;right:16px;background:none;border:none;font-size:20px;color:var(--purple);cursor:pointer;opacity:0.6;transition:var(--trans)}
.qc:hover{opacity:1;transform:scale(1.2)}
.share-btn{position:fixed;top:24px;right:90px;z-index:100;width:50px;height:50px;border-radius:50%;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--purple);box-shadow:var(--shadow);transition:var(--trans)}
.share-btn:hover{transform:scale(1.1);color:var(--rose)}
.lang-btn{position:fixed;top:24px;right:156px;z-index:100;width:50px;height:50px;border-radius:50%;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--purple);box-shadow:var(--shadow);transition:var(--trans);font-weight:700}
.lang-btn:hover{transform:scale(1.1);color:var(--rose)}
.share-card{position:fixed;inset:0;z-index:199;background:rgba(61,43,58,0.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
.share-card.op{opacity:1;pointer-events:auto}
.share-inner{background:linear-gradient(145deg,#FFF8DC,#FADADD 50%,#D4A5C9);border-radius:24px;padding:20px 24px;max-width:500px;width:95%;box-shadow:0 16px 64px rgba(107,58,91,0.3);border:2px solid var(--gold);text-align:center;position:relative;overflow-y:auto;max-height:95vh}
.share-inner canvas{border-radius:16px;box-shadow:0 8px 32px rgba(107,58,91,0.2);display:block;margin:0 auto;max-width:100%;height:auto}
.share-inner .share-btns{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.share-btn-s{background:var(--wine);color:#fff;border:none;padding:10px 24px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:var(--trans)}
.share-btn-s:hover{background:var(--rose);transform:translateY(-2px)}
.share-btn-c{background:transparent;color:var(--purple);border:1.5px solid var(--glass-b);padding:10px 24px;border-radius:20px;cursor:pointer;font-size:13px;transition:var(--trans)}
.share-btn-c:hover{background:rgba(255,255,255,0.5)}
.toast{position:fixed;top:30px;left:50%;transform:translateX(-50%);z-index:200;padding:12px 28px;border-radius:24px;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1.5px solid var(--glass-b);box-shadow:var(--shadow);font-size:14px;color:var(--wine);opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.sh{opacity:1}
.sp::-webkit-scrollbar{width:4px}.sp::-webkit-scrollbar-track{background:transparent}.sp::-webkit-scrollbar-thumb{background:var(--pink);border-radius:2px}

/* Wordbook */
.wbk-btn{position:fixed;top:120px;left:20px;z-index:101;width:44px;height:44px;border-radius:50%;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid var(--glass-b);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--purple);box-shadow:var(--shadow);transition:var(--trans)}

(function(){
  var btn=document.getElementById('pwa-install');
  var splash=document.getElementById('pwa-splash');
  var deferred=null;

  // Splash fade: only if not previously seen this session
  try{
    if(!sessionStorage.getItem('luminaria-splash-seen')){
      splash.classList.add('show');
      sessionStorage.setItem('luminaria-splash-seen','1');
      setTimeout(function(){splash.classList.remove('show');},1800);
    }
  }catch(e){
    splash.classList.add('show');
    setTimeout(function(){splash.classList.remove('show');},1800);
  }

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    deferred=e;
    if(btn)btn.style.display='flex';
  });

  if(btn){
    btn.addEventListener('click',function(){
      if(!deferred){return;}
      btn.style.display='none';
      deferred.prompt();
      deferred.userChoice.then(function(){
        deferred=null;
      });
    });
  }

  window.addEventListener('appinstalled',function(){
    if(btn)btn.style.display='none';
  });

  // Hide install button if already running as PWA
  if(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone){
    if(btn)btn.style.display='none';
  }
})();

(function initDragWB(){var panel=document.getElementById("wbk-panel"),head=document.getElementById("wbk-head"),btn=document.getElementById("wbk-btn");var pos=null,drag=false,sx=0,sy=0,ox=0,oy=0;try{pos=JSON.parse(localStorage.getItem("fw_wbk_pos")||"null");}catch(e){}function applyPos(){if(!pos)return;panel.style.left=pos.x+"px";panel.style.top=pos.y+"px";panel.style.right="auto";}function savePos(){if(!pos)return;try{localStorage.setItem("fw_wbk_pos",JSON.stringify(pos));}catch(e){}}head.addEventListener("mousedown",function(e){if(e.target.closest(".wbk-close"))return;drag=true;panel.style.transition="none";sx=e.clientX;sy=e.clientY;var r=panel.getBoundingClientRect();ox=r.left;oy=r.top;e.preventDefault();});window.addEventListener("mousemove",function(e){if(!drag)return;var dx=e.clientX-sx,dy=e.clientY-sy;var nx=Math.max(8,Math.min(window.innerWidth-288,ox+dx));var ny=Math.max(8,Math.min(window.innerHeight-100,oy+dy));panel.style.left=nx+"px";panel.style.top=ny+"px";panel.style.right="auto";pos={x:nx,y:ny};});window.addEventListener("mouseup",function(){if(drag){drag=false;panel.style.transition="";savePos();}});head.addEventListener("touchstart",function(e){if(e.target.closest(".wbk-close"))return;var t=e.touches[0];drag=true;panel.style.transition="none";sx=t.clientX;sy=t.clientY;var r=panel.getBoundingClientRect();ox=r.left;oy=r.top;},{passive:true});window.addEventListener("touchmove",function(e){if(!drag)return;var t=e.touches[0];var dx=t.clientX-sx,dy=t.clientY-sy;var nx=Math.max(8,Math.min(window.innerWidth-288,ox+dx));var ny=Math.max(8,Math.min(window.innerHeight-100,oy+dy));panel.style.left=nx+"px";panel.style.top=ny+"px";panel.style.right="auto";pos={x:nx,y:ny};},{passive:true});window.addEventListener("touchend",function(){if(drag){drag=false;panel.style.transition="";savePos();}});window.restoreWBPos=function(){applyPos();};})();

// ── Canvas Floating Light Particles ──
var canvas=document.getElementById('lp'),pctx=canvas.getContext('2d'),particles=[],PCOUNT=65;
function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
window.addEventListener('resize',resizeCanvas);resizeCanvas();
var warmColors=[{c:'rgba(255,245,220,',glow:'rgba(255,220,180,'},{c:'rgba(255,235,210,',glow:'rgba(255,210,160,'},{c:'rgba(248,210,185,',glow:'rgba(245,185,150,'},{c:'rgba(255,250,240,',glow:'rgba(255,240,215,'},{c:'rgba(235,195,170,',glow:'rgba(225,175,140,'},{c:'rgba(250,225,210,',glow:'rgba(240,200,175,'}];
for(var pi=0;pi<PCOUNT;pi++){var wc=warmColors[Math.floor(Math.random()*warmColors.length)];var r=1.5+Math.random()*3.5;particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:r,glowR:r*2.5+Math.random()*4,alpha:0.3+Math.random()*0.5,color:wc.c,glowColor:wc.glow,vx:(Math.random()-0.5)*0.8,vy:-0.2-Math.random()*0.7,speed:0.5+Math.random(),pulse:Math.random()*Math.PI*2,pulseSpeed:0.003+Math.random()*0.012});}
function renderParticles(){pctx.clearRect(0,0,canvas.width,canvas.height);pctx.globalCompositeOperation='lighter';
  for(var pi=0;pi<particles.length;pi++){var p=particles[pi];p.y+=p.vy*p.speed;p.x+=p.vx*0.4;p.pulse+=p.pulseSpeed;
    var a=p.alpha*(0.65+0.35*Math.sin(p.pulse));
    var glowGrad=pctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.glowR);
    glowGrad.addColorStop(0,p.glowColor+(a*0.7)+')');glowGrad.addColorStop(0.4,p.glowColor+(a*0.3)+')');glowGrad.addColorStop(1,p.glowColor+'0)');
    pctx.beginPath();pctx.fillStyle=glowGrad;pctx.arc(p.x,p.y,p.glowR,0,Math.PI*2);pctx.fill();
    var coreGrad=pctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
    coreGrad.addColorStop(0,p.color+(a*1.5)+')');coreGrad.addColorStop(0.5,p.color+(a*1.2)+')');coreGrad.addColorStop(1,p.color+(a*0.1)+')');
    pctx.beginPath();pctx.fillStyle=coreGrad;pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();
    if(p.y<-30){p.y=canvas.height+30;p.x=Math.random()*canvas.width;}
    if(p.x<-30)p.x=canvas.width+30;if(p.x>canvas.width+30)p.x=-30;}
  pctx.globalCompositeOperation='source-over';requestAnimationFrame(renderParticles);}
renderParticles();
